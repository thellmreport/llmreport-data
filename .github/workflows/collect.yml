name: collect (TEMPLATE)

on:
  workflow_dispatch: {}
  schedule:
    # Minute 17 - deliberately off the top-of-hour thundering herd. Cron has
    # no native jitter: per-source politeness jitter is applied IN-PROCESS by
    # the fetch library (registry fetch_defaults.schedule_jitter = true), so
    # individual hosts are hit at 17:00+rand, never in a synchronized burst.
    - cron: "17 * * * *"

permissions:
  contents: write # TODO(activation): scope via the collector-bot fine-grained token instead

concurrency:
  group: collect
  cancel-in-progress: false # never kill a half-finished evidence write; queue instead

env:
  UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/llmreport-venv # local-venv pattern
  UV_PYTHON: "3.12"

jobs:
  collect:
    if: ${{ vars.COLLECT_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2 # pinned
        with:
          fetch-depth: 1 # shallow clones mandated (design.md 1.1)

      - uses: actions/setup-python@v5.3.0 # pinned
        with:
          python-version: "3.12"

      - name: Install uv (pinned)
        run: pip install uv==0.7.13

      - name: Sync environment (locked)
        run: uv sync --frozen

      # Collectors live at collectors/src/llmreport_collectors, built on the
      # fetchkit fetch library (identified UA, conditional GET, robots
      # re-check per cycle, query-credential stripping). TODO(activation):
      # inert until the repo + bot tokens exist; remove the guard then.
      # HC_PING_URL is the healthchecks.io dead-man ping URL (design.md 5.3):
      # the runner POSTs success/fail per run via llmreport_watch.heartbeat -
      # secret-held, never hardcoded; unset secret = warning-logged no-op.
      - name: Run collectors
        env:
          HC_PING_URL: ${{ secrets.HC_PING_URL }}
        run: |
          echo "TODO(activation): uv run python -m llmreport_collectors --repo-root . --out ."
          exit 1

      - name: Lint the store before proposing the commit
        run: >
          uv run python -m llmreport_linter
          --store . --schemas schemas --registry registry/sources.json
          --emit-derived derived/state.json

      - name: Guards
        run: |
          uv run python tools/guards/redaction_gate.py --root .
          uv run python tools/guards/pii_guard.py --root .

      # Merge-queue-compatible write path (design.md 1.7): collectors NEVER
      # push to main. They push an ingest/collect-* branch and open a PR that
      # enters the merge queue; the queue serializes all writers and re-runs
      # the required checks (ci.yml). Writers implement rebase-retry
      # (3 attempts, jittered) for branch-update contention and idempotent
      # commit keys (skip when the identical sha256_full is already archived
      # for the same source and window) - both live in collector code.
      - name: Commit to ingest branch and open PR via merge queue
        env:
          GH_TOKEN: ${{ github.token }} # TODO(activation): collector-bot fine-grained PAT, contents:write, ingest/* only, no workflow scope
