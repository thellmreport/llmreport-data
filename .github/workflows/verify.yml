name: verify (TEMPLATE)

on:
  workflow_dispatch: {}
  schedule:
    # 20 minutes after collect's minute-17 tick: corroboration annotations from
    # the hourly collection land on main via the merge queue before the sweep.
    - cron: "37 * * * *"

permissions:
  contents: write # TODO(activation): scope via the verifier-bot fine-grained token instead

concurrency:
  group: verify
  cancel-in-progress: false # never abandon a half-written verdict chain; queue instead

env:
  UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/llmreport-venv # local-venv pattern
  UV_PYTHON: "3.12"

jobs:
  verify:
    if: ${{ vars.VERIFY_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2 # pinned
        with:
          fetch-depth: 1 # shallow clones mandated (design.md 1.1)

      - uses: actions/setup-python@v5.3.0 # pinned
        with:
          python-version: "3.12"

      - name: Install uv (pinned)
        run: pip install uv==0.7.13

      - name: Sync environment (locked)
        run: uv sync --frozen

      # The deterministic verifier (rules a/c, design.md 1.4.3) appends
      # verdicts/<event_id>/<seq>.json - the ONLY path the verifier-bot
      # identity may write (path scoping enforced by the linter in ci.yml).
      # verified_by records the session; reports/verify-*.json is an artifact,
      # never committed. TODO(activation): inert until repo + bot tokens exist.
      - name: Run the deterministic verifier (store sweep)
        run: |
          echo "TODO(activation): uv run python -m llmreport_verifier --store . --verified-by \"actions:verify:${{ github.run_id }}\""
          exit 1

      - name: Lint the store before proposing the commit
        run: >
          uv run python -m llmreport_linter
          --store . --schemas schemas --registry registry/sources.json
          --emit-derived derived/state.json

      - name: Guards
        run: |
          uv run python tools/guards/redaction_gate.py --root .
          uv run python tools/guards/pii_guard.py --root .

      # Merge-queue-compatible write path (design.md 1.7): the verifier NEVER
