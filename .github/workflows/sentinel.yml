# Weekly compliance sentinels (registry/sources.json "sentinels", weekly
# cadence). Module: tools/watch/llmreport_watch/sentinel.py. Two jobs:
#
#   aws-carveout        - the AWS Site Terms CC BY-SA 4.0 documentation
#                         carve-out sentence + the AWS AUP (sentinel
#                         "aws-carveout"; sweep dissents B1/B2/B3). Fetched
#                         via the registered web.archive.org replay sources
#                         (wayback-default - direct fetch only on counsel
#                         sign-off; aws.amazon.com is host-excluded and
#                         fetchkit refuses it pre-I/O). If the carve-out
#                         sentence is removed or modified, or the AUP hash
#                         changes, the clearance verdict LAPSES TO EXCLUDE:
#                         the module emits a CRITICAL queue item plus a
#                         prepared registry file flipping docs.aws.amazon.com
#                         sources to excluded=true (human/oversight turns it
#                         into the PR; nothing auto-merges). First run seeds
#                         the reference quote + hashes into the registry
#                         record - verify and commit via a reviewed PR.
#
#   weekly-sentinels    - every other registry sentinel with cadence weekly
#                         (currently mistral-legal-hub-watch). Global
#                         sentinels (fetch_defaults.global_sentinels) are
#                         enforced in fetchkit / the robots-recheck sweep;
#                         every-cycle and every-fetch sentinels run inside
#                         the hourly collectors, not here.
#
# Exit codes: 0 clean; 2 queue items emitted -> the step FAILS LOUDLY and the
# follow-up step opens one GitHub issue per queue line. Every trigger opens
# an exceptions-queue item; nothing auto-adapts silently.
name: sentinels (weekly)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "29 7 * * 1" # Mondays 07:29 UTC, after robots-recheck

permissions:
  contents: read
  issues: write # exceptions-queue items are GitHub issues

env:
  UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/llmreport-venv # local-venv pattern
  UV_PYTHON: "3.12"

jobs:
  aws-carveout:
    name: AWS carve-out + AUP sentinel
    # Gated by the SENTINELS_ENABLED repo variable (activation pattern,
    # STATUS.md); manual dispatch always runs for verification.
    if: ${{ vars.SENTINELS_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2 # pinned
        with:
          fetch-depth: 1 # shallow clones mandated (design.md 1.1)

      - uses: actions/setup-python@v5.3.0 # pinned
        with:
          python-version: "3.12"

      - name: Install uv (pinned)
        run: pip install uv==0.7.13

      - name: Sync environment (locked)
        run: uv sync --frozen

      - name: Check AWS Site Terms carve-out sentence + AUP
        run: >
          uv run python -m llmreport_watch.sentinel
          --repo-root . --sentinel aws-carveout
          --out ${{ runner.temp }}/sentinel-aws

      - name: Upload sentinel output (report, evidence, prepared PR, queue)
        if: always()
        uses: actions/upload-artifact@v4.6.0 # pinned
        with:
          name: sentinel-aws-carveout-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/sentinel-aws
            registry/sources.json
            queue/

      - name: Open exceptions-queue issues on trigger
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in queue/sentinel/*.jsonl; do
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              title=$(jq -r '.title' <<<"$line")
              {
                echo "severity: $(jq -r '.severity' <<<"$line")"
                echo "kind: $(jq -r '.kind' <<<"$line")"
                echo "action required: $(jq -r '.action_required' <<<"$line")"
                echo
                echo '```json'
                jq . <<<"$line"
                echo '```'
              } > "$RUNNER_TEMP/issue-body.md"
              gh issue create --label exceptions-queue,sentinel,aws \
                --title "$title" --body-file "$RUNNER_TEMP/issue-body.md"
            done < "$file"
          done

  weekly-sentinels:
    name: other weekly-cadence sentinels
    if: ${{ vars.SENTINELS_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2 # pinned
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.3.0 # pinned
        with:
          python-version: "3.12"

      - name: Install uv (pinned)
        run: pip install uv==0.7.13

      - name: Sync environment (locked)
        run: uv sync --frozen

      # Runs every registry sentinel whose cadence is "weekly" except
      # aws-carveout (dedicated job above) and the global sentinels.
      # Currently: mistral-legal-hub-watch - new policy document appearing
      # on legal.mistral.ai (can appear without a robots.txt change) =>
      # exceptions-queue item + route to ToU clearance (sweep 2.3).
      - name: Run weekly sentinels
        run: >
          uv run python -m llmreport_watch.sentinel
          --repo-root . --cadence weekly --exclude aws-carveout
          --out ${{ runner.temp }}/weekly-sentinels

      - name: Upload sentinel output (report, state, queue)
        if: always()
        uses: actions/upload-artifact@v4.6.0 # pinned
        with:
          name: sentinel-weekly-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/weekly-sentinels
            registry/sentinel-state/
            queue/

      - name: Open exceptions-queue issues on trigger
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in queue/sentinel/*.jsonl; do
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              title=$(jq -r '.title' <<<"$line")
              {
                echo "severity: $(jq -r '.severity' <<<"$line")"
                echo "kind: $(jq -r '.kind' <<<"$line")"
                echo "action required: $(jq -r '.action_required' <<<"$line")"
                echo
                echo '```json'
                jq . <<<"$line"
                echo '```'
              } > "$RUNNER_TEMP/issue-body.md"
              gh issue create --label exceptions-queue,sentinel \
                --title "$title" --body-file "$RUNNER_TEMP/issue-body.md"
            done < "$file"
          done
